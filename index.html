     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee & Sunflower 🌻</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0f7fa; /* Sky Blue */
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .garden {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SUNFLOWER */
        .sunflower {
            position: relative;
            z-index: 2;
        }

        .center {
            width: 80px;
            height: 80px;
            background-color: #5d4037; /* Brown center */
            border-radius: 50%;
            border: 4px solid #3e2723;
            z-index: 3;
            position: relative;
        }

        .petals {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            animation: rotate 20s linear infinite;
        }

        .petal {
            position: absolute;
            width: 40px;
            height: 70px;
            background-color: #ffeb3b; /* Bright Yellow */
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            left: 60px;
            transform-origin: bottom center;
        }

        /* Creating petals around the circle */
        .petal:nth-child(1) { transform: rotate(0deg); }
        .petal:nth-child(2) { transform: rotate(45deg); }
        .petal:nth-child(3) { transform: rotate(90deg); }
        .petal:nth-child(4) { transform: rotate(135deg); }
        .petal:nth-child(5) { transform: rotate(180deg); }
        .petal:nth-child(6) { transform: rotate(225deg); }
        .petal:nth-child(7) { transform: rotate(270deg); }
        .petal:nth-child(8) { transform: rotate(315deg); }

        /* THE BEE */
        .bee-container {
            position: absolute;
            width: 250px;
            height: 250px;
            animation: orbit 4s linear infinite;
            z-index: 10;
        }

        .bee {
            position: absolute;
            top: 0;
            left: 50%;
            width: 40px;
            height: 30px;
            background: #ffd600;
            border-radius: 20px;
            border: 2px solid #333;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1);
        }

        /* Bee Stripes */
        .bee::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 100%;
            left: 10px;
            background: #333;
            box-shadow: 10px 0 0 #333;
            opacity: 0.8;
        }

        /* Wings */
        .wings {
            position: absolute;
            top: -10px;
            left: 10px;
            width: 20px;
            height: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: flap 0.1s infinite alternate;
        }

        /* ANIMATIONS */
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes flap {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.5); }
        }

        .message {
            position: absolute;
            bottom: -60px;
            text-align: center;
            color: #ef6c00;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="garden">
        <!-- Sunflower -->
        <div class="sunflower">
            <div class="petals">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
            </div>
            <div class="center"></div>
        </div>

        <!-- Flying Bee -->
        <div class="bee-container">
            <div class="bee">
                <div class="wings"></div>
            </div>
        </div>

        <div class="message">
            <h2>Bee-utiful Day! 🐝🌻</h2>
        </div>
    </div>

</body>
</html>
